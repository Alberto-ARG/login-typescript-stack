services:
  backend:
    image: node:20-alpine
    container_name: auth-demo-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    environment:
      JWT_SECRET: dev-secret-change-me
      WATCHPACK_POLLING: "true"
    expose:
      - "3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_data:/app/data

  frontend:
    image: node:20-alpine
    container_name: auth-demo-frontend
    working_dir: /app
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4321"
    environment:
      BACKEND_URL: http://backend:3000
      CHOKIDAR_USEPOLLING: "true"
    expose:
      - "4321"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  nginx:
    image: nginx:1.27-alpine
    container_name: auth-demo-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  backend_node_modules:
  frontend_node_modules:
  backend_data:
